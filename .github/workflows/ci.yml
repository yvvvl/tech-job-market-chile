name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend-ci:
    name: backend-ci
    runs-on: ubuntu-latest
    timeout-minutes: 20

    defaults:
      run:
        working-directory: backend

    env:
      DATABASE_URL: postgresql+psycopg2://techuser:techpass@localhost:5432/tech_jobs_chile_test
      TEST_DATABASE_URL: postgresql+psycopg2://techuser:techpass@localhost:5432/tech_jobs_chile_test

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: tech_jobs_chile_test
          POSTGRES_USER: techuser
          POSTGRES_PASSWORD: techpass
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U techuser -d tech_jobs_chile_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            backend/requirements.txt
            backend/requirements-dev.txt

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt

      - name: Run Ruff lint
        run: ruff check .

      - name: Check Ruff formatting
        run: ruff format --check .

      - name: Compile backend
        run: python -m compileall app

      - name: Apply database migrations
        run: python -m alembic upgrade head

      - name: Check pending database migrations
        run: python -m alembic check

      - name: Run backend tests
        run: python -m pytest

  frontend-ci:
    name: frontend-ci
    runs-on: ubuntu-latest
    timeout-minutes: 15

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

      - name: Build frontend
        run: npm run build